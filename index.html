<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            color: #ff4d4d;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 10px;
        }
        p {
            color: #cc0000;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }
        .buttons {
            position: relative;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #yesBtn {
            background-color: #4CAF50;
            color: white;
            z-index: 10;
        }
        #yesBtn:hover {
            background-color: #45a049;
        }
        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
            left: 110px; 
            transition: top 0.2s, left 0.2s;
        }
        .hidden {
            display: none;
        }
        #message {
            font-size: 2.5rem;
            color: #d81b60;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 id="title">I am so sorry! 🥺</h1>
    <p id="subtitle">I messed up and I feel terrible. Will you please forgive me?</p>

    <div class="buttons" id="btnContainer">
        <button id="yesBtn" onclick="forgiven()">Yes</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>

    <div id="message" class="hidden">
        Yay! I promise to make it up to you! ❤️
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const container = document.getElementById('btnContainer');
            
            const maxX = window.innerWidth - noBtn.offsetWidth - 50;
            const maxY = window.innerHeight - noBtn.offsetHeight - 50;
            
            const randomX = Math.floor(Math.random() * maxX) - (window.innerWidth / 2) + 50;
            const randomY = Math.floor(Math.random() * maxY) - (window.innerHeight / 2) + 50;
            
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        function forgiven() {
            document.getElementById('btnContainer').classList.add('hidden');
            document.getElementById('title').classList.add('hidden');
            document.getElementById('subtitle').classList.add('hidden');
            document.getElementById('message').classList.remove('hidden');
        }
    </script>

</body>
</html>
